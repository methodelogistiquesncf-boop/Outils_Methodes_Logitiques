<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Portfolio // Méthode Logistique</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;700&family=Inter:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root{
    --bg: #f6f4ee;
    --panel: #ffffff;
    --panel-hover: #fbf9f4;
    --border: #e8e2d5;
    --text: #33322d;
    --muted: #948d7d;
    --amber: #eeb96a;
    --amber-ink: #6b4a17;
    --red: #e2948d;
    --red-ink: #7a3129;
    --shadow-sm: 0 1px 3px rgba(80,64,30,0.06);
    --shadow-md: 0 10px 30px rgba(80,64,30,0.10);
  }
  *{box-sizing:border-box;}
  body{
    margin:0;
    background:
      radial-gradient(1000px 500px at 100% -10%, rgba(238,185,106,0.10), transparent 60%),
      var(--bg);
    color:var(--text);
    font-family:'Inter', sans-serif;
    min-height:100vh;
  }
  .wrap{max-width:1600px; margin:0 auto; padding:40px 40px 80px;}

  header{display:flex; flex-wrap:wrap; align-items:flex-end; justify-content:space-between; gap:20px; margin-bottom:28px; border-bottom:1px solid var(--border); padding-bottom:20px;}
  h1{font-family:'Space Grotesk', sans-serif; font-size:30px; margin:0; font-weight:700; letter-spacing:-0.5px; color:#2a2924;}
  .sub{color:var(--muted); font-size:13px; margin-top:6px;}

  button, .btn{
    font-family:'Inter', sans-serif;
    border:1px solid var(--border);
    background:var(--panel);
    color:var(--text);
    padding:10px 16px;
    border-radius:10px;
    font-size:13px;
    cursor:pointer;
    box-shadow:var(--shadow-sm);
    transition: border-color .15s ease, background .15s ease, transform .1s ease, box-shadow .15s ease;
    display:inline-flex; align-items:center; gap:8px;
  }
  button:hover{border-color:#d9cfb8; background:var(--panel-hover); box-shadow:var(--shadow-md);}
  button:active{transform:scale(0.98);}
  .btn-primary{background:var(--amber); color:var(--amber-ink); border-color:var(--amber); font-weight:600;}
  .btn-primary:hover{background:#f2c785; border-color:#f2c785;}
  .btn-ghost{background:transparent; box-shadow:none;}
  .btn-ghost:hover{box-shadow:var(--shadow-sm);}

  .search{
    width:100%;
    background:var(--panel); border:1px solid var(--border); border-radius:10px;
    padding:11px 14px; color:var(--text); font-size:14px; box-shadow:var(--shadow-sm);
    margin-bottom:20px;
  }
  .search::placeholder{color:var(--muted);}
  .search:focus{outline:none; border-color:var(--amber);}

  .grid{display:grid; grid-template-columns:repeat(auto-fill, minmax(210px, 1fr)); gap:12px;}

  .card{
    position:relative;
    display:block;
    background:var(--panel);
    border:1px solid var(--border);
    border-radius:12px;
    padding:14px 16px;
    box-shadow:var(--shadow-sm);
    text-decoration:none;
    color:inherit;
    cursor:pointer;
    transition: transform .15s ease, box-shadow .15s ease, border-color .15s ease;
  }
  .card:hover{transform:translateY(-2px); border-color:var(--amber); box-shadow:var(--shadow-md);}
  .card h3{
    font-family:'Space Grotesk', sans-serif; font-size:15px; margin:0 0 4px; font-weight:700;
    color:#2a2924; padding-right:44px;
    display:-webkit-box; -webkit-line-clamp:1; -webkit-box-orient:vertical; overflow:hidden;
  }
  .card p{
    font-size:12px; color:var(--muted); line-height:1.4; margin:0;
    display:-webkit-box; -webkit-line-clamp:2; -webkit-box-orient:vertical; overflow:hidden;
  }
  .card.no-link{cursor:default;}
  .card-actions{
    position:absolute; top:10px; right:10px; display:flex; gap:2px;
    opacity:0; transition:opacity .12s ease;
  }
  .card:hover .card-actions, .card:focus-within .card-actions{opacity:1;}
  .icon-btn{
    border:none; background:transparent; box-shadow:none; color:var(--muted);
    padding:4px 6px; font-size:13px; border-radius:6px; line-height:1;
  }
  .icon-btn:hover{background:#f1ece0; color:var(--text); box-shadow:none;}
  .icon-btn.del:hover{background:#fbeae8; color:var(--red-ink);}

  .empty{
    grid-column:1/-1; text-align:center; padding:60px 20px; color:var(--muted);
    border:1px dashed var(--border); border-radius:16px; font-size:14px; background:var(--panel);
  }
  .empty strong{color:var(--text); display:block; font-family:'Space Grotesk',sans-serif; font-size:17px; margin-bottom:8px;}

  footer{margin-top:32px; padding-top:16px; border-top:1px solid var(--border); color:var(--muted); font-size:12px; text-align:right;}
  footer.error{color:var(--red-ink);}

  .overlay{
    position:fixed; inset:0; background:rgba(60,50,30,0.25); backdrop-filter:blur(3px);
    display:none; align-items:center; justify-content:center; z-index:50; padding:20px;
  }
  .overlay.show{display:flex;}
  .modal{
    background:var(--panel); border:1px solid var(--border); border-radius:18px;
    width:100%; max-width:420px; padding:26px;
    box-shadow: 0 24px 60px rgba(60,50,20,0.18);
  }
  .modal h2{font-family:'Space Grotesk', sans-serif; margin:0 0 18px; font-size:19px; color:#2a2924;}
  .field{margin-bottom:14px;}
  .field label{display:block; font-size:12px; color:var(--muted); margin-bottom:6px;}
  .field input, .field textarea{
    width:100%; background:#fbf9f4; border:1px solid var(--border); border-radius:10px;
    padding:10px 12px; color:var(--text); font-size:14px; font-family:'Inter', sans-serif;
  }
  .field input:focus, .field textarea:focus{outline:none; border-color:var(--amber);}
  .field textarea{resize:vertical; min-height:60px;}
  .modal-actions{display:flex; justify-content:flex-end; gap:10px; margin-top:20px;}

  @media (max-width:600px){
    h1{font-size:24px;}
    .wrap{padding:24px 16px 60px;}
  }
  @media (prefers-reduced-motion: reduce){
    *{transition:none !important;}
  }
</style>
</head>
<body>

<div class="wrap">
  <header>
    <div>
      <h1>Méthode Logistique — Portfolio</h1>
      <div class="sub">Tous les outils du service, réunis au même endroit.</div>
    </div>
    <button class="btn-primary" id="addBtn">+ Ajouter un outil</button>
  </header>

  <input type="text" class="search" id="searchInput" placeholder="Rechercher un outil...">

  <div class="grid" id="grid"></div>

  <footer id="footerNote">Données synchronisées avec GitHub.</footer>
</div>

<div class="overlay" id="overlay">
  <div class="modal">
    <h2 id="modalTitle">Ajouter un outil</h2>
    <form id="cardForm">
      <div class="field">
        <label>Nom de l'outil</label>
        <input type="text" id="fName" required placeholder="Ex: Pilotage M00">
      </div>
      <div class="field">
        <label>Lien (URL)</label>
        <input type="text" id="fUrl" required placeholder="https://...">
      </div>
      <div class="field">
        <label>Description courte</label>
        <textarea id="fDesc" placeholder="Ex: Suivi de production, tableau par jour"></textarea>
      </div>
      <div class="modal-actions">
        <button type="button" class="btn-ghost" id="cancelBtn">Annuler</button>
        <button type="submit" class="btn-primary" id="saveBtn">Enregistrer</button>
      </div>
    </form>
  </div>
</div>

<script>
/* ================================================================
   CONFIGURATION GITHUB — à remplir une seule fois par toi.
   Remplace les valeurs ci-dessous puis mets à jour le fichier sur GitHub.
   ================================================================ */
const GH_OWNER  = 'methodelogistiquesncf-boop';
const GH_REPO   = 'https://methodelogistiquesncf-boop.github.io/Outils_Methodes_Logitiques'; // vérifie le vrai nom du dépôt
const GH_BRANCH = 'main';
const GH_PATH   = 'data.json';
/* ================================================================ */

const TOKEN_KEY = 'logi_portfolio_gh_token_v1';
const LOCAL_CACHE_KEY = 'logi_portfolio_cache_v1';

function makeId(){ return 'c'+Math.random().toString(36).slice(2,10); }

const fallbackData = [
  { id: makeId(), name:'Pilotage M00', url:'', desc:'Suivi de production, tableau par jour.' },
  { id: makeId(), name:'Complet Conforme', url:'', desc:'Contrôle de conformité des kits.' },
  { id: makeId(), name:'Analyse Excel F-Activités', url:'', desc:'Analyse des fichiers F-Activités et A-Delta.' },
];

let cards = [];
let search = '';
let editingId = null;
let currentSha = null;
let ghToken = null;
let isSaving = false;
let pendingSave = false;

function b64EncodeUnicode(str){
  return btoa(encodeURIComponent(str).replace(/%([0-9A-F]{2})/g, (m,p1)=>String.fromCharCode('0x'+p1)));
}
function b64DecodeUnicode(str){
  return decodeURIComponent(atob(str).split('').map(c=>'%'+('00'+c.charCodeAt(0).toString(16)).slice(-2)).join(''));
}
function escapeHtml(str){
  return String(str).replace(/[&<>"']/g, s=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[s]));
}

function setFooter(text, isError){
  const el = document.getElementById('footerNote');
  el.textContent = text;
  el.className = isError ? 'error' : '';
}

function getToken(){
  if(ghToken) return ghToken;
  let stored = null;
  try{ stored = localStorage.getItem(TOKEN_KEY); }catch(e){}
  if(stored){ ghToken = stored; return ghToken; }
  const entered = prompt(
    "Connexion GitHub (une seule fois) :\nColle ton token d'accès personnel (Contents: Read & write sur ce dépôt)."
  );
  if(entered && entered.trim()){
    ghToken = entered.trim();
    try{ localStorage.setItem(TOKEN_KEY, ghToken); }catch(e){}
  }
  return ghToken;
}

async function githubGetFile(){
  const token = getToken();
  if(!token) throw new Error('Token manquant');
  const res = await fetch(`https://api.github.com/repos/${GH_OWNER}/${GH_REPO}/contents/${encodeURIComponent(GH_PATH)}?ref=${encodeURIComponent(GH_BRANCH)}`, {
    headers: { 'Authorization': `token ${token}`, 'Accept': 'application/vnd.github+json' }
  });
  if(!res.ok){
    if(res.status === 401){ try{ localStorage.removeItem(TOKEN_KEY); }catch(e){} ghToken = null; }
    const body = await res.text().catch(()=> '');
    throw new Error(`GET ${res.status}${body ? ' — '+body.slice(0,150) : ''}`);
  }
  const data = await res.json();
  const json = JSON.parse(b64DecodeUnicode(data.content));
  return { json, sha: data.sha };
}

async function githubPutFile(obj, sha, message){
  const token = getToken();
  if(!token) throw new Error('Token manquant');
  const body = {
    message: message || 'Mise à jour du portfolio',
    content: b64EncodeUnicode(JSON.stringify(obj, null, 2)),
    branch: GH_BRANCH
  };
  if(sha) body.sha = sha;
  const res = await fetch(`https://api.github.com/repos/${GH_OWNER}/${GH_REPO}/contents/${encodeURIComponent(GH_PATH)}`, {
    method:'PUT',
    headers: { 'Authorization': `token ${token}`, 'Accept':'application/vnd.github+json', 'Content-Type':'application/json' },
    body: JSON.stringify(body)
  });
  if(!res.ok){
    if(res.status === 401){ try{ localStorage.removeItem(TOKEN_KEY); }catch(e){} ghToken = null; }
    const errBody = await res.json().catch(()=>({}));
    throw new Error(errBody.message || `PUT ${res.status}`);
  }
  return await res.json();
}

async function loadFromGithub(){
  try{
    const {json, sha} = await githubGetFile();
    cards = Array.isArray(json) ? json : (json.cards || []);
    currentSha = sha;
    cacheLocally();
    setFooter('Données synchronisées avec GitHub.');
  }catch(e){
    console.error(e);
    const raw = localStorage.getItem(LOCAL_CACHE_KEY);
    cards = raw ? JSON.parse(raw) : fallbackData;
    setFooter("Impossible de charger data.json depuis GitHub — affichage local.", true);
  }
  render();
}

function cacheLocally(){
  try{ localStorage.setItem(LOCAL_CACHE_KEY, JSON.stringify(cards)); }catch(e){}
}

async function persist(message){
  cacheLocally();
  if(isSaving){ pendingSave = true; return; }
  isSaving = true;
  setFooter('Enregistrement…');
  try{
    const {sha} = await githubGetFile().catch(()=>({sha: currentSha}));
    const result = await githubPutFile(cards, sha || currentSha, message);
    currentSha = result.content.sha;
    setFooter('Données synchronisées avec GitHub.');
  }catch(e){
    console.error(e);
    setFooter("Échec de l'enregistrement sur GitHub : "+e.message, true);
  }finally{
    isSaving = false;
    if(pendingSave){ pendingSave = false; persist('Mise à jour du portfolio'); }
  }
}

function render(){
  const grid = document.getElementById('grid');
  const filtered = cards.filter(c =>
    !search || (c.name+' '+(c.desc||'')).toLowerCase().includes(search.toLowerCase())
  );

  if(filtered.length===0){
    grid.innerHTML = `<div class="empty"><strong>Rien à afficher ici</strong>Ajoute un outil ou change ta recherche.</div>`;
    return;
  }

  grid.innerHTML = filtered.map(c=>{
    const urlSafe = c.url && c.url.trim() ? c.url.trim() : null;
    const tag = urlSafe ? 'a' : 'div';
    const hrefAttrs = urlSafe ? `href="${escapeHtml(urlSafe)}" target="_blank" rel="noopener"` : '';
    return `
    <${tag} class="card ${urlSafe?'':'no-link'}" ${hrefAttrs} title="${urlSafe ? 'Ouvrir '+escapeHtml(c.name) : 'Pas de lien renseigné'}">
      <h3>${escapeHtml(c.name)}</h3>
      <p>${escapeHtml(c.desc||'')}</p>
      <div class="card-actions">
        <button type="button" class="icon-btn" title="Modifier" data-edit="${c.id}">✎</button>
        <button type="button" class="icon-btn del" title="Supprimer" data-del="${c.id}">✕</button>
      </div>
    </${tag}>`;
  }).join('');

  grid.querySelectorAll('[data-edit]').forEach(btn=>{
    btn.addEventListener('click', (e)=>{
      e.preventDefault(); e.stopPropagation();
      openModal(btn.dataset.edit);
    });
  });
  grid.querySelectorAll('[data-del]').forEach(btn=>{
    btn.addEventListener('click', (e)=>{
      e.preventDefault(); e.stopPropagation();
      const card = cards.find(c=>c.id===btn.dataset.del);
      if(confirm(`Supprimer "${card ? card.name : ''}" ?`)){
        cards = cards.filter(c=>c.id!==btn.dataset.del);
        render();
        persist(`Suppression : ${card ? card.name : ''}`);
      }
    });
  });
}

function openModal(id){
  editingId = id || null;
  const card = id ? cards.find(c=>c.id===id) : null;
  document.getElementById('modalTitle').textContent = card ? "Modifier l'outil" : 'Ajouter un outil';
  document.getElementById('fName').value = card ? card.name : '';
  document.getElementById('fUrl').value = card ? card.url : '';
  document.getElementById('fDesc').value = card ? card.desc : '';
  document.getElementById('overlay').classList.add('show');
  document.getElementById('fName').focus();
}
function closeModal(){
  document.getElementById('overlay').classList.remove('show');
  editingId = null;
}

document.getElementById('addBtn').addEventListener('click', ()=> openModal(null));
document.getElementById('cancelBtn').addEventListener('click', closeModal);
document.getElementById('overlay').addEventListener('click', (e)=>{
  if(e.target.id==='overlay') closeModal();
});

document.getElementById('cardForm').addEventListener('submit', (e)=>{
  e.preventDefault();
  const name = document.getElementById('fName').value.trim();
  const url = document.getElementById('fUrl').value.trim();
  const desc = document.getElementById('fDesc').value.trim();
  if(!name || !url) return;

  let message;
  if(editingId){
    const card = cards.find(c=>c.id===editingId);
    Object.assign(card, { name, url, desc });
    message = `Modification : ${name}`;
  } else {
    cards.push({ id: makeId(), name, url, desc });
    message = `Ajout : ${name}`;
  }
  render();
  closeModal();
  persist(message);
});

document.getElementById('searchInput').addEventListener('input', (e)=>{
  search = e.target.value;
  render();
});

loadFromGithub();
</script>

</body>
</html>
